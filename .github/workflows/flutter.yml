name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms=android .

      - name: Patch app build.gradle
        run: |
          echo '' | base64 -d > android/app/build.gradle

      - name: Set app display name
        run: |
          echo '<resources><string name="app_name">Bill Tipper</string></resources>' \
            > android/app/src/main/res/values/strings.xml

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Install Android SDK components
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" "build-tools;35.0.0"
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Decode keystore
        continue-on-error: true
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release AAB
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BillTipper-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: BillTipper-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
